id: aggressive
kind: human_model
description: Faster IDM/MOBIL human-driver behavior with shorter headways and more lane changes.
profile:
  speed_multiplier: 1.1
  TIME_WANTED: 0.9
  POLITENESS: 0.0
  LANE_CHANGE_DELAY: 0.5
  LANE_CHANGE_MIN_ACC_GAIN: 0.05
  LANE_CHANGE_MAX_BRAKING_IMPOSED: 3.0
  COMFORT_ACC_MAX: 4.0
  COMFORT_ACC_MIN: -6.0
  ACC_MAX: 7.0
defaults:
  lane_change_model: mobil
  car_following_model: idm
