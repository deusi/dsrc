id: cautious
kind: human_model
description: Slower, more polite IDM/MOBIL human-driver behavior.
profile:
  speed_multiplier: 0.9
  TIME_WANTED: 2.0
  POLITENESS: 0.5
  LANE_CHANGE_DELAY: 4.0
  LANE_CHANGE_MIN_ACC_GAIN: 0.35
  LANE_CHANGE_MAX_BRAKING_IMPOSED: 1.2
  COMFORT_ACC_MAX: 2.0
  COMFORT_ACC_MIN: -3.0
  ACC_MAX: 4.0
defaults:
  lane_change_model: mobil
  car_following_model: idm
