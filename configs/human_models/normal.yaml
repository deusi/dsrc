id: normal
kind: human_model
description: Highway-env-like default IDM/MOBIL human-driver behavior.
profile:
  speed_multiplier: 1.0
  TIME_WANTED: 1.5
  POLITENESS: 0.0
  LANE_CHANGE_DELAY: 2.0
  LANE_CHANGE_MIN_ACC_GAIN: 0.2
  LANE_CHANGE_MAX_BRAKING_IMPOSED: 2.0
  COMFORT_ACC_MAX: 3.0
  COMFORT_ACC_MIN: -5.0
  ACC_MAX: 6.0
defaults:
  lane_change_model: mobil
  car_following_model: idm
