id: straight_multilane
kind: topology
description: Open three-lane straight highway for speed and lane-placement experiments.
road:
  layout: straight
  length_m: 1500.0
  lanes_count: 3
  speed_limit_mps: 30.0
  segment_ids:
    - straight_upstream
    - straight_mid
    - straight_downstream
  segment_lengths:
    straight_upstream: 500.0
    straight_mid: 500.0
    straight_downstream: 500.0
  entry_segments:
    - straight_upstream
  exit_segments:
    - straight_downstream
  merge_nodes: []
  detector_locations:
    straight_upstream:
      - 500.0
    straight_mid:
      - 500.0
    straight_downstream:
      - 450.0
control:
  supports_lane_change: true
  supported_action_fields:
    - desired_speed
    - desired_lane

