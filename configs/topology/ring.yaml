id: ring
kind: topology
description: Closed ring-road topology for wave damping experiments.
road:
  layout: ring
  circumference_m: 260.0
  radius_m: 41.38
  lanes_count: 1
  speed_limit_mps: 25.0
  segment_ids:
    - ring_main
  segment_lengths:
    ring_main: 260.0
  entry_segments:
    - ring_main
  exit_segments:
    - ring_main
  merge_nodes: []
  detector_locations:
    ring_main:
      - 65.0
      - 130.0
      - 195.0
control:
  supports_lane_change: false
  supported_action_fields:
    - desired_speed_bin
    - desired_headway_bin
    - lane_preference
    - merge_mode
safety:
  lane_change_dwell_s: 15
  max_lane_changes_per_km: 2
  max_follower_braking_mps2: 2.5
  comfortable_decel_mps2: 3.0
