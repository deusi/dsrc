id: exp_ring_wave_damping
kind: experiment
refs:
  topology: ring
  demand: medium
  human_model: heterogeneous
  training: mappo
experiment:
  id: exp_ring_wave_damping
  description: Ring-road wave damping reference experiment.
  seed: 7
controller:
  family: rl
  name: mappo
  requires_global_state: true
sensing:
  range_m: 150.0
  latency_s: 0.0
  position_noise_std: 0.0
  speed_noise_std: 0.0
  density_bin_edges_veh_per_km:
    - 12.0
    - 30.0
  mean_speed_bin_edges_mps:
    - 8.0
    - 18.0
  queue_speed_mps: 5.0
metrics:
  primary:
    - mean_speed
    - speed_std
    - jam_fraction
    - wave_amplitude
    - recovery_time
  safety:
    - rolling_roadblock_score
    - lane_changes_per_av_km
    - hard_brakes_caused_by_av
    - av_low_speed_uncongested_fraction
  thresholds:
    queue_speed_mps: 5.0
    hard_braking_mps2: -3.0
    throughput_window_s: 60.0
    low_speed_free_flow_delta_mps: 8.0
    uncongested_density_threshold_veh_per_km: 12.0
outputs:
  episode_summary: outputs/metrics/exp_ring_wave_damping/episode_summary.json
  step_metrics: outputs/metrics/exp_ring_wave_damping/step_metrics.csv
  segment_metrics: outputs/metrics/exp_ring_wave_damping/segment_metrics.csv
overrides:
  demand:
    total_vehicles_per_hour: 1600
